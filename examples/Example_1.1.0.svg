  <text x="97.5" y="203.5" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto">A blank example sequence diagram with 3 actors and no calls! However it does define "</text>
  <text x="640.21" y="203.5" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">.params</text>
  <text x="699.02" y="203.5" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto">" object</text>
  <text x="97.5" y="220.3" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto">to give a default looks and feel for comment boxes. There is also Tag that provides a shortcut to colour</text>
  <text x="97.5" y="237.1" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto">and font markup into a comment string. For example, the following text is marked up with the </text>
  <text x="674.1" y="237.1" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">&lt;code&gt;</text>
  <text x="724.51" y="237.1" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> tag:</text>
  <text x="97.5" y="270.7" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">title: "Example 1"</text>
  <text x="97.5" y="287.5" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">version: "1.0"</text>
  <text x="97.5" y="304.3" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">actors: [</text>
  <text x="97.5" y="321.1" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">  {name: "Client", alias: client, bgColour: "rgb(255,126,121)"}, </text>
  <text x="97.5" y="337.9" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">  {name: "Server", alias: server}, </text>
  <text x="97.5" y="354.7" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">  {name: "Database", alias: db}]</text>
  <text x="97.5" y="371.5" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">params:</text>
  <text x="97.5" y="388.3" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">  {</text>
  <text x="97.5" y="405.1" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">    comment: {bgColour: "rgb(0,253,144)", spacing: 1.2},</text>
  <text x="97.5" y="421.9" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">    globalSpacing: 30,</text>
  <text x="97.5" y="438.7" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">    tags: ["&lt;code&gt;=&lt;rgb(0,0,180)&gt;&lt;font=monospace&gt;", "&lt;/code&gt;=&lt;/font&gt;&lt;/rgb&gt;"],</text>
  <text x="97.5" y="455.5" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">  }</text>
  <text x="97.5" y="472.3" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto"> lines: [...]</text>
  <text x="97.5" y="505.9" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto">Note that a parameter defined tag is just an alias for standard comment markup. Supported markup tags include:</text>
  <text x="97.5" y="522.7" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - </text>
  <text x="109.94" y="522.7" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">&lt;i&gt;</text>
  <text x="135.15" y="522.7" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - italic</text>
  <text x="97.5" y="539.5" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - </text>
  <text x="109.94" y="539.5" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">&lt;b&gt;</text>
  <text x="135.15" y="539.5" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - bold</text>
  <text x="97.5" y="556.3" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - </text>
  <text x="109.94" y="556.3" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">&lt;sz&gt;</text>
  <text x="143.55" y="556.3" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - with upto one and less than three + or - following symbols, e.g. </text>
  <text x="547.82" y="556.3" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="10" xml:space="preserve" dominant-baseline="auto"> </text>
  <text x="550.6" y="556.3" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="10" xml:space="preserve" dominant-baseline="auto">&lt;sz--&gt;</text>
  <text x="97.5" y="573.1" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - </text>
  <text x="109.94" y="573.1" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">&lt;rgb(x,y,z)&gt;</text>
  <text x="210.76" y="573.1" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - to define RGB colour</text>
  <text x="97.5" y="589.9" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - </text>
  <text x="109.94" y="589.9" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">&lt;font&gt;</text>
  <text x="160.35" y="589.9" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> - to define font. Only the generic families </text>
  <text x="418.7" y="589.9" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">sans-serif</text>
  <text x="502.71" y="589.9" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto">, </text>
  <text x="510.49" y="589.9" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">serif</text>
  <text x="552.5" y="589.9" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> and </text>
  <text x="583.64" y="589.9" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">monospace</text>
  <text x="659.25" y="589.9" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> are supported, backed by bundled Liberation TTFs measured via opentype.js.</text>
  <text x="97.5" y="623.5" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto">Markup remains in force until the end of the string, e.g. </text>
  <text x="439.9" y="623.5" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">&lt;code&gt; here will run until the end of the line.</text>
  <text x="97.5" y="640.3" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto">But </text>
  <text x="122.4" y="640.3" fill="rgb(0,0,180)" font-family="Liberation Mono, Courier New, Courier, monospace" font-size="14" xml:space="preserve" dominant-baseline="auto">&lt;code&gt; and &lt;/code&gt;</text>
  <text x="273.63" y="640.3" fill="rgb(0, 0, 0)" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" xml:space="preserve" dominant-baseline="auto"> markup is enclosed to open and close markup parts of the string.</text>
