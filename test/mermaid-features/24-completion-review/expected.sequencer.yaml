title: Mermaid completion review
version: '1.0'
actors:
  - {name: [API, Gateway], alias: API, actorType: participant}
  - {name: 'Primary # Store', alias: DB, actorType: participant}
lines:
  - {type: blank, height: 0, comment: 'Escaped # and ; plus & name support', actors: [API, DB]}
  - {type: call, from: API, to: DB, text: 'Query #42; status & health [Mermaid: API->>DB: Query #42; status & health]', toArrow: fill, arrow: fill}
  - {type: return, from: DB, to: API, text: 'OK <done> [Mermaid: DB-->>API: OK <done>]', lineDash: [4, 2], toArrow: fill, arrow: fill}
description:
  - Demonstrates Mermaid entity-code escapes and actor-name line breaks.
  - 'From the project root, regenerate this Mermaid transform and SVG with:'
  - node sequencer.js --mermaid -i test/mermaid-features/24-completion-review/input.mmd -o -f -t test/mermaid-features/24-completion-review
