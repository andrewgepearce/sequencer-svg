title: Mermaid activations
version: '1.0'
actors:
  - name: Caller
    alias: Caller
    actorType: participant
  - name: Service
    alias: Service
    actorType: participant
  - name: DB
    alias: DB
    actorType: participant
lines:
  - type: blank
    height: 0
    activate:
      - DB
  - type: blank
    height: 0
    deactivate:
      - DB
  - type: blank
    height: 0
    comment: >-
      Note beside explicit activate [Mermaid: Note right of Service: Note beside
      explicit activate]
    actor: Service
  - type: blank
    height: 0
    activate:
      - Service
  - type: call
    from: Caller
    to: Service
    text: 'Service already active [Mermaid context: activate Service]'
    breakFromFlow: true
    toArrow: fill
    arrow: fill
  - type: blank
    height: 0
    deactivate:
      - Service
  - type: blank
    height: 0
    comment: >-
      Note after explicit deactivate [Mermaid: Note over Service: Note after
      explicit deactivate]
    actor: Service
  - type: call
    from: Caller
    to: Service
    text: 'Activate target via suffix [Mermaid: Caller->>+Service]'
    breakFromFlow: true
    toArrow: fill
    arrow: fill
  - type: call
    from: Caller
    to: Service
    text: 'Deactivate target via suffix [Mermaid: Caller->>-Service]'
    breakFromFlow: true
    breakToFlow: true
    toArrow: fill
    arrow: fill
  - type: blank
    height: 0
    comment: >-
      Note before explicit DB activation [Mermaid: Note over DB: Note before
      explicit DB activation]
    actor: DB
  - type: blank
    height: 0
    activate:
      - DB
  - type: call
    from: Service
    to: DB
    text: 'DB remains active [Mermaid context: activate DB]'
    breakFromFlow: true
    toArrow: fill
    arrow: fill
  - type: blank
    height: 0
    comment: >-
      Note before explicit DB deactivation [Mermaid: Note left of DB: Note
      before explicit DB deactivation]
    actor: DB
  - type: blank
    height: 0
    deactivate:
      - DB
description:
  - Demonstrates explicit Mermaid activation control and activation shortcuts.
  - 'From the project root, regenerate this Mermaid transform and SVG with:'
  - >-
    node sequencer.js --mermaid -i
    test/mermaid-features/05-activations/input.mmd -o -f -t
    test/mermaid-features/05-activations
