title: Mermaid autonumber
version: '1.0'
actors:
  - name: Caller
    alias: Caller
    actorType: participant
  - name: Service
    alias: Service
    actorType: participant
lines:
  - type: call
    from: Caller
    to: Service
    text: Ping
    breakFromFlow: true
    breakToFlow: true
    arrow: fill
  - type: call
    from: Service
    to: Caller
    text: Pong
    breakFromFlow: true
    breakToFlow: true
    arrow: fill
description:
  - >-
    Demonstrates Mermaid autonumber mapped onto the sequencer autonumber
    document flag.
  - 'From the project root, regenerate this Mermaid transform and SVG with:'
  - >-
    <code>node sequencer.js --mermaid -i
    test/mermaid-features/07-autonumber/input.mmd -o -f -t
    test/mermaid-features/07-autonumber
autonumber: true
