title: Mermaid create and destroy
version: '1.0'
actors:
  - {name: Orchestrator, alias: Orchestrator, actorType: participant}
  - {name: Worker, alias: Worker, actorType: participant}
lines:
  - type: call
    from: Orchestrator
    to: Worker
    text: 'Stop inherited worker [Mermaid: Orchestrator-xWorker: Stop inherited worker]'
    toArrow: cross
    arrow: cross
    destroyTo: true
    breakToFlow: true
  - {type: create, from: Orchestrator, to: Worker, text: 'Create worker [Mermaid: Orchestrator->>Worker: Create worker]', toArrow: fill, arrow: fill}
  - type: return
    from: Worker
    to: Orchestrator
    text: 'Ready [Mermaid: Worker-->>Orchestrator: Ready]'
    continueFromFlow: true
    lineDash: [4, 2]
    toArrow: fill
    arrow: fill
  - type: call
    from: Orchestrator
    to: Worker
    text: 'Stop worker [Mermaid: Orchestrator-xWorker: Stop worker]'
    toArrow: cross
    arrow: cross
    destroyTo: true
    breakToFlow: true
  - {type: create, from: Orchestrator, to: Worker, text: 'Recreate worker [Mermaid: Orchestrator->>Worker: Recreate worker]', toArrow: fill, arrow: fill}
  - type: call
    from: Orchestrator
    to: Worker
    text: 'Stop recreated worker [Mermaid: Orchestrator-xWorker: Stop recreated worker]'
    toArrow: cross
    arrow: cross
    destroyTo: true
    breakToFlow: true
description:
  - 'Demonstrates Mermaid actor lifecycle control, including destroy-before-create and recreate.'
  - 'From the project root, regenerate this Mermaid transform and SVG with:'
  - node sequencer.js --mermaid -i test/mermaid-features/17-create-destroy/input.mmd -o -f -t test/mermaid-features/17-create-destroy
