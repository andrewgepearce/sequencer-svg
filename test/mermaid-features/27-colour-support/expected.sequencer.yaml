title: Mermaid colour support
version: '1.0'
actors:
  - {name: Edge API, alias: API, actorType: boundary, bgColour: '#D0EBFF', fgColour: '#0B7285', borderColour: '#1971C2'}
  - {name: Worker, alias: Worker, actorType: control, bgColour: 'rgba(255, 244, 179, 0.8)', fgColour: 'rgb(102, 60, 0)', borderColour: '#B08900'}
  - {name: Cache node, alias: Cache, actorType: collections, bgColour: '#FFF3BF', fgColour: '#7A4F01', borderColour: '#F08C00'}
actorGroups:
  - {title: Cache tier, bgColour: '#FFE8CC', actors: [Cache]}
lines:
  - type: fragment
    fragmentType: rect
    title: ''
    condition: ''
    bgColour: '#E7F5FF'
    borderWidth: 0
    lines:
      - {type: call, from: API, to: Worker, text: 'Start coloured flow [Mermaid: API->>Worker: Start coloured flow]', toArrow: fill, arrow: fill}
      - {type: call, from: Worker, to: Cache, text: 'Warm cache [Mermaid: Worker->>Cache: Warm cache]', toArrow: fill, arrow: fill}
    startActor: API
    endActor: Cache
description:
  - Demonstrates Mermaid colour hints mapped onto sequencer colour properties.
  - 'From the project root, regenerate this Mermaid transform and SVG with:'
  - node sequencer.js --mermaid -i test/mermaid-features/27-colour-support/input.mmd -o -f -t test/mermaid-features/27-colour-support
