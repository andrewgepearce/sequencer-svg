title: Input
version: '1.0'
actors:
  - name: Caller
    alias: Caller
    actorType: participant
  - name: Service
    alias: Service
    actorType: participant
lines:
  - type: call
    from: Caller
    to: Service
    text: 'Sync request [Mermaid: Caller->>Service]'
    breakFromFlow: true
    breakToFlow: true
    toArrow: fill
    arrow: fill
  - type: return
    from: Service
    to: Caller
    text: 'Dotted response [Mermaid: Service-->>Caller]'
    breakToFlow: true
    lineDash:
      - 4
      - 2
    toArrow: fill
    arrow: fill
  - type: call
    from: Caller
    to: Service
    text: 'Async signal [Mermaid: Caller-)Service]'
    breakFromFlow: true
    breakToFlow: true
    toArrow: open
    arrow: open
    async: true
  - type: return
    from: Service
    to: Caller
    text: 'Async dotted signal [Mermaid: Service--)Caller]'
    breakToFlow: true
    lineDash:
      - 4
      - 2
    toArrow: open
    arrow: open
  - type: call
    from: Caller
    to: Service
    text: 'Failure signal [Mermaid: Caller-xService]'
    breakFromFlow: true
    breakToFlow: true
    toArrow: cross
    arrow: cross
  - type: return
    from: Service
    to: Caller
    text: 'Dotted failure [Mermaid: Service--xCaller]'
    breakToFlow: true
    lineDash:
      - 4
      - 2
    toArrow: cross
    arrow: cross
  - type: call
    from: Caller
    to: Service
    text: 'Solid no arrow [Mermaid: Caller->Service]'
    breakFromFlow: true
    breakToFlow: true
    arrow: none
  - type: return
    from: Service
    to: Caller
    text: 'Dotted no arrow [Mermaid: Service-->Caller]'
    breakToFlow: true
    lineDash:
      - 4
      - 2
    arrow: none
